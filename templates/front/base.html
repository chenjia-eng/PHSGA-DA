{% from "common/_macros.html" import static %}

{% from "common/_macros.html" import static %}


<!doctype html>
<html class="no-js" lang="zxx">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>{% block title %}{% endblock %}</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">

    <!-- Place favicon.ico in the root directory -->
    <link rel="shortcut icon" type="image/x-icon"
        href="{{ url_for('static', filename='front/assets/images/logo/favicon.png') }}">

    <!-- CSS here -->
    <link rel="stylesheet" href="{{ url_for('static', filename='front/assets/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='front/assets/css/animate.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='front/assets/css/backToTop.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='front/assets/css/magnific-popup.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='front/assets/css/preloader.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='front/assets/css/fontawesome-all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='front/assets/css/meanmenu.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='front/assets/css/swiper-bundle.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='front/assets/css/default.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='front/assets/css/style.css') }}">
</head>

<body>
    <!--[if lte IE 9]>
        <p class="browserupgrade">You are using an <strong>outdated</strong> browser. Please <a href="https://browsehappy.com/">upgrade your browser</a> to improve your experience and security.</p>
        <![endif]-->

    <!-- preloader area start -->
    <div id="pre-loader">
        <div class="pre-loader">
            <span></span>
            <span></span>
        </div>
    </div>
    <!-- preloader area end -->


    <!-- back to top start -->
    <div class="progress-wrap">
        <svg class="progress-circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
            <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
        </svg>
    </div>
    <!-- back to top end -->


    <!-- header start -->
    <header>
        <div id="header-sticky" class="header__area header__transparent header__white">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-xxl-4 col-xl-3 col-lg-2 col-md-4 col-5">
                        <div class="logo">
                            <a href="{{ url_for('front.index') }}"><img
                                    src="{{ url_for('static', filename='front/assets/images/logo/1.png') }}"
                                    alt="logo"></a>
                        </div>
                    </div>
                    <div class="col-xxl-8 col-xl-9 col-lg-10 d-lg-block col-md-8 col-7">
                        <div class="main-menu main-menu-3 d-flex justify-content-end">
                            <nav id="mobile-menu">
                                <ul>
                                    <li><a href="{{ url_for('front.index') }}"><span
                                                class="fa-solid fa-home"></span>Home</a>
                                    </li>
                                    <li><a href="{{ url_for('front.batch') }}"><span
                                                class="fa-solid fa-road"></span>Predict</a></li>
                                    <!-- <li><a href="{{ url_for('front.download') }}"><span
                                                class="fa-solid fa-download"></span>Download</a></li> -->
                                    <li><a href="{{ url_for('front.help') }}"><span
                                                class="fa-solid fa-hands-helping"></span>Help</a></li>
                                    <li><a href="{{ url_for('front.about') }}"><span
                                                class="fa-solid fa-circle-info"></span>About</a></li>

                                </ul>
                            </nav>
                            <div class="header__right d-flex align-items-center">
                                <div class="side-menu-icon d-lg-none">
                                    <button class="side-toggle"><i class="fa-solid fa-bars"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- header end -->


    <!-- mobile menu sidebar start -->
    <div class="fix">
        <div class="side-info">
            <button class="side-info-close"><i class="fas fa-times"></i></button>
            <div class="side-info-content">
                <div class="mobile-menu"></div>
            </div>
        </div>
    </div>
    <div class="offcanvas-overlay"></div>
    <!-- mobile menu sidebar end -->

    <main>

        <!-- page-title area start -->
        <section class="page__title-area page__title-height fix d-flex align-items-center p-relative">
            <div class="page__title-shape">
                <img class="page-title-s-4"
                    src="{{ url_for('static', filename='front/assets/images/shape/page-title/page-title-s-4.png') }}"
                    alt="">
                <img class="page-title-s-5 wow fadeInDown" data-wow-delay="1s"
                    src="{{ url_for('static', filename='front/assets/images/shape/page-title/page-title-s-5.png') }}"
                    alt="">
            </div>

        </section>
        <!-- page-title area end -->



        {% block content %}{% endblock %}



    </main>


    <!-- footer area start -->
    <footer>
        <div class="footer__area fix p-relative pt-5 pb-5">
            <div class="container">
                <div class="row">
                    <div class="col-xl-12">
                        <div class="footer__copyright" style="text-align: center">
                            <!-- <p>Copyright © 2024 By<a href="{{ url_for('front.index') }}">PHSGA-DA</a>. All rights
                                reserved.<a href="https://beian.miit.gov.cn/">WAN ICP 2024059032.</a></p> -->
                            <p><a href="{{ url_for('front.index') }}">PHSGA-DA</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    <!-- footer area end -->


    <!-- JS here -->
    <script src="{{ url_for('static', filename='front/assets/js/vendor/jquery-3.6.0.min.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/vendor/jquery.waypoints.min.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/backToTop.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/jquery.counterup.min.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/isotope.pkgd.min.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/swiper-bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/jquery.meanmenu.min.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/ajax-form.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/wow.min.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/imagesloaded.pkgd.min.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/jquery.magnific-popup.min.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='front/assets/js/vendor/ai.js') }}"></script>
    {% block js %}{% endblock %}
</body>

</html>
